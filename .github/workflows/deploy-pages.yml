name: Deploy to GitHub Pages

# Запасной вариант деплоя — используется только если включить вручную
# через workflow_dispatch или установить ENABLE_GH_PAGES=true в env репо.
# Основной деплой рекомендуется через Vercel/Netlify/Cloudflare (см. docs/DEPLOY.md).

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Build with GitHub Pages base path
        env:
          # Override site URL для Pages staging — base подставляется автоматически
          # из GITHUB_REPOSITORY при необходимости
          PUBLIC_SITE_URL: ${{ github.event.repository.has_pages && format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) || 'https://era-lider.ru' }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
